<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimO₂ · Outil pédagogique IFSI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #07101f;
      --bg2:    #0c1a2e;
      --card:   rgba(255,255,255,.038);
      --bdr:    rgba(255,255,255,.09);
      --txt:    #e2e8f0;
      --txt2:   #94a3b8;
      --txt3:   #475569;
      --sky:    #38bdf8;
      --teal:   #14b8a6;
      --amber:  #f59e0b;
      --violet: #a78bfa;
      --green:  #22c55e;
      --red:    #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 55%, var(--bg) 100%);
      color: var(--txt);
      min-height: 100vh;
      padding-bottom: 72px;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 18px; }

    /* ── HEADER ─────────────────────────────────────────── */
    .site-header { text-align: center; padding: 38px 24px 22px; }
    .badge {
      display: inline-block;
      background: rgba(56,189,248,.1); border: 1px solid rgba(56,189,248,.25);
      color: var(--sky); padding: 4px 16px; border-radius: 20px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
    }
    .site-header h1 { font-size: clamp(22px, 5vw, 36px); font-weight: 700; letter-spacing: -.5px; }
    .site-header p  { color: var(--txt3); font-size: 14px; margin-top: 7px; font-style: italic; }

    /* ── STEPS BAR ──────────────────────────────────────── */
    .steps-bar {
      display: flex; justify-content: center; align-items: center;
      gap: 5px; padding: 0 16px 26px; flex-wrap: wrap;
    }
    .step-dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; transition: all .28s;
      border: 2px solid var(--bdr); background: rgba(255,255,255,.03); color: var(--txt3);
    }
    .step-dot.active { background: rgba(56,189,248,.15); border-color: var(--sky); color: var(--sky); }
    .step-dot.done   { background: var(--sky); border-color: var(--sky); color: #06101f; }
    .step-lbl { font-size: 12px; color: var(--txt3); transition: color .28s; }
    .step-lbl.active { color: var(--txt2); }
    .step-line { width: 18px; height: 1px; background: var(--bdr); }

    /* ── CARDS ──────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1.5px solid var(--bdr);
      border-radius: 18px; padding: 26px; margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }
    .card-title { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
    .card-sub   { color: var(--txt3); font-size: 13px; margin-bottom: 22px; }

    /* ── FORM ───────────────────────────────────────────── */
    .lbl {
      display: block; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--txt3); margin-bottom: 8px;
    }
    .lbl-row { display: flex; justify-content: space-between; align-items: baseline; }
    .lbl-val { font-family: 'JetBrains Mono', monospace; color: var(--sky); font-size: 15px; font-weight: 600; }
    .lbl-sub { font-size: 11px; color: var(--txt3); margin-left: 6px; font-family: Outfit,sans-serif; }

    input[type=text] {
      background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px; color: var(--txt); padding: 10px 14px;
      font-size: 16px; font-family: 'JetBrains Mono', monospace;
      outline: none; width: 100%; transition: border-color .2s;
    }
    input[type=text]:focus { border-color: rgba(56,189,248,.4); }

    
    
    .range-lbl { display: flex; justify-content: space-between; font-size: 10px; color: var(--txt3); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .col   { display: flex; flex-direction: column; gap: 16px; }
    .col8  { display: flex; flex-direction: column; gap: 8px; }

    /* ── SELECT CARDS ───────────────────────────────────── */
    .sel {
      cursor: pointer; border: 1.5px solid var(--bdr); border-radius: 12px;
      padding: 12px 16px; background: rgba(255,255,255,.025);
      color: var(--txt2); font-family: Outfit, sans-serif; font-size: 15px;
      transition: all .18s; display: flex; align-items: center; gap: 12px;
      user-select: none;
    }
    .sel:hover { background: rgba(255,255,255,.06); color: var(--txt); border-color: rgba(255,255,255,.15); }
    .sel.on    { background: rgba(56,189,248,.1); color: var(--txt); border-color: rgba(56,189,248,.42); }
    .sel.center { justify-content: center; flex-direction: column; text-align: center; padding: 16px 8px; }
    .sel .si   { font-size: 22px; flex-shrink: 0; }
    .sel .sd   { font-size: 12px; color: var(--txt3); margin-top: 2px; }

    /* ── BUTTONS ────────────────────────────────────────── */
    .btn-p {
      background: linear-gradient(135deg,#0ea5e9,#38bdf8);
      border: none; border-radius: 12px; color: #06101f;
      font-family: Outfit, sans-serif; font-size: 16px; font-weight: 700;
      padding: 13px 28px; cursor: pointer; transition: opacity .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-p:hover { opacity: .9; transform: translateY(-1px); }
    .btn-p:active { transform: translateY(0); }
    .btn-g {
      background: rgba(255,255,255,.04); border: 1.5px solid var(--bdr);
      border-radius: 12px; color: var(--txt2); font-family: Outfit, sans-serif;
      font-size: 15px; padding: 11px 22px; cursor: pointer; transition: all .18s;
      white-space: nowrap;
    }
    .btn-g:hover { background: rgba(255,255,255,.08); color: var(--txt); }
    .btn-full { width: 100%; }
    .btn-row  { display: flex; gap: 10px; justify-content: space-between; }

    /* ── STAT CARDS ─────────────────────────────────────── */
    .stat {
      background: rgba(0,0,0,.22); border: 1px solid rgba(255,255,255,.06);
      border-radius: 13px; padding: 15px; text-align: center;
    }
    .stat-v { font-family: 'JetBrains Mono', monospace; font-size: 23px; font-weight: 600; color: var(--teal); display: block; }
    .stat-l { font-size: 10px; color: var(--txt3); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; display: block; margin-top: 4px; }
    .stat-s { font-size: 12px; color: #4b5563; font-style: italic; display: block; margin-top: 6px; }

    /* ── BREATHING ANIMATION ────────────────────────────── */
    .breath-scene {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 26px;
    }
    .breath-ring-wrap {
      position: relative; width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring-anim {
      position: absolute; width: 132px; height: 132px; border-radius: 50%;
      border: 2px solid rgba(20,184,166,.32);
    }
    .lung-anim {
      width: 112px; height: 112px; border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,.22) 0%, rgba(20,184,166,.06) 100%);
      border: 2px solid rgba(20,184,166,.52);
      display: flex; align-items: center; justify-content: center; font-size: 44px;
    }
    .rr-display { font-family: 'JetBrains Mono', monospace; color: var(--teal); font-size: 16px; font-weight: 600; margin-top: 14px; }
    .rr-sub     { color: var(--txt3); font-size: 12px; margin-top: 3px; }

    /* ── AIR BARS ────────────────────────────────────────── */
    .air-box { background: rgba(0,0,0,.2); border-radius: 12px; padding: 14px; }
    .air-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--txt3); margin-bottom: 8px; }
    .air-bar { display: flex; border-radius: 8px; overflow: hidden; height: 34px; }
    .air-o2  { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; transition: width .4s ease; min-width: 38px; }
    .air-n2  { flex: 1; background: rgba(100,116,139,.18); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--txt3); }
    .air-note { font-size: 12px; color: var(--txt3); margin-top: 8px; font-style: italic; line-height: 1.5; }

    /* ── FIO2 PREVIEW ────────────────────────────────────── */
    .preview-box { background: rgba(0,0,0,.22); border-radius: 14px; padding: 18px; }
    .fio2-num   { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; }
    .fio2-row   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .fio2-bar-wrap { position: relative; height: 38px; border-radius: 9px; overflow: hidden; background: rgba(100,116,139,.12); margin-bottom: 12px; }
    .fio2-base  { position: absolute; left: 0; top: 0; height: 100%; width: 21%; background: rgba(100,116,139,.32); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--txt3); font-family: 'JetBrains Mono', monospace; }
    .fio2-fill  { position: absolute; left: 0; top: 0; height: 100%; border-radius: 9px; transition: width .4s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }
    .fio2-fill span { color: #fff; font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .fio2-lvl  { border-radius: 10px; padding: 12px; }
    .fio2-lvl-t { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .fio2-per  { font-size: 13px; color: var(--txt3); }

    /* ── INFO BOXES ─────────────────────────────────────── */
    .info { border-radius: 11px; padding: 13px 15px; font-size: 13px; line-height: 1.65; }
    .info-amber { background: rgba(245,158,11,.07); border: 1px solid rgba(245,158,11,.22); color: #f59e0b; }
    .info-teal  { background: rgba(20,184,166,.07);  border: 1px solid rgba(20,184,166,.22);  color: #14b8a6; }

    /* ── RECAP GRID (step 4) ─────────────────────────────── */
    .recap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
    .rc { background: rgba(0,0,0,.22); border-radius: 10px; padding: 10px 13px; }
    .rc-k { font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
    .rc-v { font-size: 13px; color: var(--txt); margin-top: 4px; line-height: 1.4; }

    /* ── ANALYSIS TEXT ───────────────────────────────────── */
    .analysis p { margin-bottom: 16px; color: #c2cfe0; font-size: 15px; line-height: 1.8; }
    .analysis strong { color: #f1f5f9; font-size: 16px; }

    /* ── LOADING DOTS ────────────────────────────────────── */
    .dots { text-align: center; padding: 26px 0; }
    .dots span {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: var(--sky); margin: 0 3px;
      animation: dotB 1.4s ease-in-out infinite both;
    }
    .dots span:nth-child(2) { animation-delay: .16s; }
    .dots span:nth-child(3) { animation-delay: .32s; }
    .dots-msg { color: var(--txt3); font-size: 13px; margin-top: 10px; font-style: italic; }

    /* ── DIVIDER ─────────────────────────────────────────── */
    hr.div { border: none; border-top: 1px solid rgba(255,255,255,.07); margin: 18px 0; }

    /* ── WELCOME ─────────────────────────────────────────── */
    .welcome { text-align: center; padding: 6px 0 32px; }
    .welcome-icon { font-size: 62px; display: block; margin-bottom: 22px; }
    .welcome p { color: var(--txt2); font-size: 16px; line-height: 1.75; max-width: 460px; margin: 0 auto; }
    .pts { display: flex; flex-direction: column; gap: 14px; margin: 26px 0; text-align: left; }
    .pt  { display: flex; gap: 12px; align-items: flex-start; }
    .pt-i { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .pt-t { font-size: 15px; color: var(--txt2); line-height: 1.6; }
    .pt-t strong { color: var(--txt); }

    /* ── API KEY INPUT ───────────────────────────────────── */
    .apikey-box {
      background: rgba(56,189,248,.06); border: 1px solid rgba(56,189,248,.2);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
    }
    .apikey-box p { font-size: 13px; color: var(--txt3); margin-bottom: 10px; line-height: 1.6; }
    .apikey-box a { color: var(--sky); }
    .apikey-input-row { display: flex; gap: 8px; }
    .apikey-input-row input { flex: 1; padding: 9px 12px; font-size: 14px; }
    .apikey-input-row button { padding: 9px 16px; font-size: 14px; border-radius: 9px; border: none; background: var(--sky); color: #06101f; font-weight: 700; cursor: pointer; font-family: Outfit,sans-serif; }
    .apikey-saved { color: var(--green); font-size: 12px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

    /* ── NAV ACTIONS ─────────────────────────────────────── */
    .nav-col { display: flex; flex-direction: column; gap: 10px; }
    .nav-row { display: flex; gap: 10px; }
    .nav-row > * { flex: 1; }

    /* ── ANIMATIONS ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotB {
      0%,80%,100% { transform: scale(0); }
      40%          { transform: scale(1); }
    }
    .fadeup { animation: fadeUp .35s ease forwards; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width:480px) {
      .grid2 { grid-template-columns: 1fr; }
      .recap  { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }
  
    /* ── SLIDERS AMÉLIORÉS ── */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 10px;
      border-radius: 5px;
      background: rgba(255,255,255,.10);
      outline: none; cursor: pointer;
      margin-top: 4px;
      touch-action: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid rgba(255,255,255,.18);
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      transition: transform .15s;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.18); }
    input[type=range]::-webkit-slider-runnable-track {
      height: 10px; border-radius: 5px;
    }

    input[type=range]::-webkit-slider-thumb {
      background: #38bdf8;
    }

    /* ── STEPPER WRAPPER ── */
    .sl-wrap {
      display: flex; align-items: center; gap: 10px; width: 100%;
    }
    .sl-wrap input[type=range] { flex: 1; }
    .sl-btn {
      flex-shrink: 0;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.55);
      font-size: 20px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, transform .1s;
      user-select: none; -webkit-user-select: none;
    }
    .sl-btn:hover  { background: rgba(255,255,255,.12); color: #fff; }
    .sl-btn:active { transform: scale(.9); }

</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════════════════
const PATHOLOGIES = [
  { id:'sain',            label:'Aucune pathologie respiratoire',  short:'Bonne santé',  icon:'💚' },
  { id:'bpco_stable',     label:'BPCO stable',                     short:'BPCO stable',  icon:'🫁' },
  { id:'bpco_decompense', label:'BPCO décompensé',                 short:'BPCO déc.',    icon:'⚠️' },
  { id:'detresse',        label:'Détresse respiratoire aiguë',     short:'Détresse',     icon:'🔴' },
  { id:'postop',          label:'Post-opératoire',                  short:'Post-op',      icon:'🏥' },
  { id:'cardiac',         label:'OAP / Insuffisance cardiaque',    short:'OAP',          icon:'❤️' },
  { id:'pneumonie',       label:'Pneumonie',                        short:'Pneumonie',    icon:'🦠' },
];
const DISPOSITIFS = [
  { id:'lunettes',      label:'Lunettes nasales',            icon:'👃', dMin:0.5, dMax:6  },
  { id:'masque_simple', label:'Masque simple',               icon:'😷', dMin:5,   dMax:10 },
  { id:'mhc',           label:'Masque haute concentration',  icon:'🫧', dMin:8,   dMax:15 },
];

// ═══════════════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════════════
let S = {
  view: 'welcome',
  patient: { prenom:'Marie', sexe:'F', age:72, taille:162, poids:65, pathologie:'bpco_stable' },
  rx:      { dispositif:'lunettes', debit:2 },
  analyse: '', loading: false,
  apiKey: localStorage.getItem('simo2_key') || '',
  apiKeySaved: !!localStorage.getItem('simo2_key'),
  showKey: false,
};

// ═══════════════════════════════════════════════════════
//  PHYSIOLOGIE
// ═══════════════════════════════════════════════════════
function physio() {
  const { age, sexe, poids, taille, pathologie } = S.patient;
  const pit = Math.max(18, sexe==='H' ? 50+0.91*(taille-152.4) : 45.5+0.91*(taille-152.4));
  let vt = age<12 ? poids*7.5 : Math.min(750, pit*7);
  let rr = age<1?42 : age<3?30 : age<6?25 : age<12?20 : age<18?16 : age<65?15 : 17;
  if      (pathologie==='detresse')        { rr=Math.round(rr*1.75); vt*=0.72; }
  else if (pathologie==='bpco_decompense') { rr=Math.round(rr*1.40); vt*=0.82; }
  else if (pathologie==='bpco_stable')     { rr=Math.round(rr*1.15); vt*=0.88; }
  else if (pathologie==='cardiac')         { rr=Math.round(rr*1.30); vt*=0.88; }
  else if (pathologie==='pneumonie')       { rr=Math.round(rr*1.25); vt*=0.88; }
  else if (pathologie==='postop')          { rr=Math.round(rr*1.10); }
  vt = Math.round(Math.max(80, Math.min(800,vt)));
  rr = Math.max(10,Math.min(42,rr));
  const vm  = Math.round((vt*rr)/100)/10;
  const vo2 = Math.round(poids*3.5);
  const spo2Map = {sain:age>70?96:98,bpco_stable:93,bpco_decompense:86,detresse:81,postop:95,cardiac:92,pneumonie:90};
  const spo2 = spo2Map[pathologie]||97;
  const analog = vt<150?'un verre à liqueur':vt<260?'un pot de yaourt (125 mL)':vt<360?'un grand verre d\'eau':vt<480?'une canette de soda (33 cL)':vt<580?'une bouteille d\'eau (50 cL)':'une grande bouteille d\'eau';
  return { pit:Math.round(pit), vt, rr, vm, vo2, spo2, analog };
}

function fio2() {
  const { dispositif, debit } = S.rx;
  if (dispositif==='lunettes')      return Math.round(Math.min(44, 21+debit*4));
  if (dispositif==='masque_simple') return Math.round(Math.min(50, 28+debit*2.5));
  if (dispositif==='mhc')           return Math.round(Math.min(95, 50+debit*3.5));
  return 21;
}

function lvl(f) {
  if (f<=24) return { t:'Enrichissement très léger',   c:'#22c55e' };
  if (f<=35) return { t:'Enrichissement modéré',       c:'#84cc16' };
  if (f<=50) return { t:'Enrichissement significatif', c:'#f59e0b' };
  if (f<=70) return { t:'Enrichissement élevé',        c:'#f97316' };
  return           { t:'Enrichissement très élevé',    c:'#ef4444' };
}

function ageLabel(a) {
  if (a<3) return 'Nourrisson / bambin';
  if (a<12) return 'Enfant';
  if (a<18) return 'Adolescent';
  if (a<65) return 'Adulte';
  return 'Personne âgée';
}

// ═══════════════════════════════════════════════════════
//  ANIMATION RESPIRATOIRE (CSS injecté dynamiquement)
// ═══════════════════════════════════════════════════════
function updateBreath(rr, vt) {
  const s  = (60/rr).toFixed(2);
  const sc = Math.min(1.5, 1+vt/1200);
  let el = document.getElementById('breath-css');
  if (!el) { el=document.createElement('style'); el.id='breath-css'; document.head.appendChild(el); }
  el.textContent = `
    @keyframes breathe  { 0%,100%{transform:scale(1);opacity:.75} 50%{transform:scale(${sc});opacity:1} }
    @keyframes ring-out { 0%{transform:scale(1);opacity:.4}        100%{transform:scale(1.9);opacity:0} }
    .lung-anim { animation: breathe  ${s}s ease-in-out infinite; }
    .ring-anim { animation: ring-out ${s}s ease-out   infinite; }
  `;
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMd(text) {
  return text.split('\n\n').filter(p=>p.trim()).map(para => {
    const parts = para.split(/\*\*([^*]+)\*\*/g);
    const inner = parts.map((p,i)=>i%2===1?`<strong>${esc(p)}</strong>`:esc(p)).join('');
    return `<p>${inner}</p>`;
  }).join('');
}

//  ACTIONS
// ═══════════════════════════════════════════════════════
function go(view) { S.view=view; render(); }

function up(k,v) { S.patient={...S.patient,[k]:v}; render(); }

function upRx(k,v) { S.rx={...S.rx,[k]:v}; render(); }

function selDisp(id) {
  const d = DISPOSITIFS.find(x=>x.id===id);
  let dbt = S.rx.debit;
  if (dbt<d.dMin) dbt=d.dMin;
  if (dbt>d.dMax) dbt=d.dMax;
  S.rx = { dispositif:id, debit:dbt };
  render();
}

function goAnalyse() { S.view='step4'; S.analyse=''; render(); runAnalyse(); }

function saveKey() {
  localStorage.setItem('simo2_key', S.apiKey);
  S.apiKeySaved = true;
  render();
}

function reset() {
  S = { ...S, view:'step1', patient:{prenom:'',sexe:'F',age:40,taille:165,poids:70,pathologie:'sain'}, rx:{dispositif:'lunettes',debit:2}, analyse:'' };
  render();
}

    if (key) { headers['x-api-key']=key; headers['anthropic-version']='2023-06-01'; }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers,
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    S.analyse = data.content?.find(b=>b.type==='text')?.text || '';
  } catch(e) {
    S.analyse = `**⚠️ Erreur de connexion**\n\n${e.message||'Vérifiez votre clé API et votre connexion réseau.'}`;
  }

  S.loading=false; render();
}

// ═══════════════════════════════════════════════════════
//  INITIALISATION
// ═══════════════════════════════════════════════════════
render();

// ── ENHANCEMENT SLIDERS : boutons −/+ ──────────────────────
function enhanceSliders() {
  document.querySelectorAll('input[type=range]').forEach(input => {
    if (input.closest('.sl-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'sl-wrap';
    input.parentNode.insertBefore(wrap, input);

    const btnM = document.createElement('button');
    btnM.className = 'sl-btn'; btnM.textContent = '−'; btnM.type = 'button';
    btnM.addEventListener('click', e => {
      e.preventDefault();
      const step = parseFloat(input.step) || 1;
      const nv   = Math.max(parseFloat(input.min), parseFloat(input.value) - step);
      input.value = nv;
      input.dispatchEvent(new Event('input', { bubbles:true }));
    });

    const btnP = document.createElement('button');
    btnP.className = 'sl-btn'; btnP.textContent = '+'; btnP.type = 'button';
    btnP.addEventListener('click', e => {
      e.preventDefault();
      const step = parseFloat(input.step) || 1;
      const nv   = Math.min(parseFloat(input.max), parseFloat(input.value) + step);
      input.value = nv;
      input.dispatchEvent(new Event('input', { bubbles:true }));
    });

    wrap.appendChild(btnM);
    wrap.appendChild(input);
    wrap.appendChild(btnP);
  });
}

</script>
