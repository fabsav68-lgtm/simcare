<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimContention · Outil pédagogique IFSI</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Epilogue:wght@300;400;500;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0d0a14;
  --bg2:   #130f1e;
  --card:  rgba(255,255,255,.032);
  --bdr:   rgba(255,255,255,.08);
  --txt:   #ede8f5;
  --txt2:  #8a7fa0;
  --txt3:  #3d3550;
  --em:    #b8a0e8;
  --em2:   #9b7fc4;
  --rose:  #e88aaa;
  --teal:  #5ecfbe;
  --amber: #e8c46a;
  --red:   #e06060;
  --green: #72c98a;
  /* Classes de compression */
  --c1:    #72c98a;
  --c2:    #5ecfbe;
  --c3:    #e8c46a;
  --c4:    #e06060;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Epilogue',sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 10% 0%,  rgba(184,160,232,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(94,207,190,.04) 0%,transparent 50%);
  color:var(--txt); min-height:100vh; padding-bottom:80px;
}
.wrap{max-width:700px;margin:0 auto;padding:0 20px}

/* ── HEADER ── */
.site-header{text-align:center;padding:42px 24px 22px}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(184,160,232,.08);border:1px solid rgba(184,160,232,.22);
  color:var(--em);padding:5px 16px;border-radius:20px;
  font-family:'Fira Mono',monospace;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
}
.site-header h1{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(26px,6vw,42px);font-weight:700;
  letter-spacing:-.5px;line-height:1.1;
}
.site-header h1 em{font-style:italic;color:var(--em)}
.site-header p{color:var(--txt3);font-size:14px;margin-top:8px;font-style:italic}

/* ── STEPS ── */
.steps-bar{display:flex;justify-content:center;align-items:center;gap:4px;padding:0 16px 28px;flex-wrap:wrap}
.step-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;transition:all .28s;
  border:2px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt3);
  font-family:'Fira Mono',monospace;
}
.step-dot.active{background:rgba(184,160,232,.12);border-color:var(--em);color:var(--em)}
.step-dot.done  {background:var(--em2);border-color:var(--em2);color:#0d0a14}
.step-lbl{font-size:12px;color:var(--txt3);transition:color .28s}
.step-lbl.active{color:var(--txt2)}
.step-line{width:14px;height:1px;background:var(--bdr)}

/* ── CARD ── */
.card{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:28px;margin-bottom:16px}
.card-title{font-family:'Libre Baskerville',serif;font-size:21px;font-weight:700;margin-bottom:5px}
.card-sub{color:var(--txt3);font-size:13px;margin-bottom:22px;line-height:1.65}

/* ── FORM ── */
.lbl{display:block;font-family:'Fira Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.lbl-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.lbl-val{font-family:'Fira Mono',monospace;color:var(--em);font-size:14px;font-weight:500}

input[type=text]{
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;color:var(--txt);padding:11px 14px;
  font-size:15px;font-family:'Fira Mono',monospace;
  outline:none;width:100%;transition:border-color .2s;
}
input[type=text]:focus{border-color:rgba(184,160,232,.4)}



.range-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-top:5px;font-family:'Fira Mono',monospace}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.col  {display:flex;flex-direction:column;gap:18px}
.col8 {display:flex;flex-direction:column;gap:8px}

/* ── SEL ── */
.sel{
  cursor:pointer;border:1.5px solid var(--bdr);border-radius:12px;
  padding:12px 16px;background:rgba(255,255,255,.02);
  color:var(--txt2);font-size:14px;transition:all .18s;
  display:flex;align-items:center;gap:12px;user-select:none;
}
.sel:hover{background:rgba(255,255,255,.05);color:var(--txt);border-color:rgba(255,255,255,.14)}
.sel.on   {background:rgba(184,160,232,.08);color:var(--txt);border-color:rgba(184,160,232,.4)}
.sel .si  {font-size:20px;flex-shrink:0}
.sel .sd  {font-size:11px;color:var(--txt3);margin-top:2px}

/* ── BOUTONS ── */
.btn-p{
  background:linear-gradient(135deg,var(--em2),var(--em));
  border:none;border-radius:12px;color:#0d0a14;
  font-family:'Epilogue',sans-serif;font-size:15px;font-weight:700;
  padding:13px 28px;cursor:pointer;transition:opacity .2s,transform .1s;
}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{
  background:rgba(255,255,255,.03);border:1.5px solid var(--bdr);
  border-radius:12px;color:var(--txt2);
  font-family:'Epilogue',sans-serif;font-size:14px;
  padding:11px 20px;cursor:pointer;transition:all .18s;
}
.btn-g:hover{background:rgba(255,255,255,.07);color:var(--txt)}
.btn-full{width:100%}
.nav-row{display:flex;gap:10px}
.nav-row>*{flex:1}
.nav-col{display:flex;flex-direction:column;gap:10px}

/* ── STAT ── */
.stat{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.055);border-radius:13px;padding:14px;text-align:center}
.stat-v{font-family:'Fira Mono',monospace;font-size:20px;font-weight:500;color:var(--em);display:block}
.stat-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;font-family:'Fira Mono',monospace;display:block;margin-top:4px}
.stat-s{font-size:11px;color:#2d2540;font-style:italic;display:block;margin-top:5px;line-height:1.4}

/* ── JAMBE SCHÉMA ── */
.leg-schema{
  display:flex;flex-direction:column;align-items:center;
  gap:0;margin:0 auto 20px;max-width:200px;position:relative;
}
.leg-part{
  position:relative;display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(184,160,232,.2);transition:all .4s;
  cursor:default;
}
.leg-label{
  position:absolute;right:-90px;font-family:'Fira Mono',monospace;
  font-size:11px;color:var(--txt2);white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.leg-label::before{content:'';width:20px;height:1px;background:rgba(184,160,232,.3)}
.leg-meas{
  position:absolute;left:-90px;font-family:'Fira Mono',monospace;
  font-size:12px;font-weight:500;color:var(--em);white-space:nowrap;text-align:right;
  display:flex;align-items:center;gap:6px;flex-direction:row-reverse;
}
.leg-meas::before{content:'';width:20px;height:1px;background:rgba(184,160,232,.3)}
.leg-measure-line{
  position:absolute;width:calc(100% + 16px);height:2px;
  background:rgba(184,160,232,.25);left:-8px;
  pointer-events:none;
}

/* ── CLASSES COMPRESSION ── */
.class-card{
  border-radius:14px;padding:16px;border:2px solid transparent;
  cursor:pointer;transition:all .2s;
}
.class-card:hover{transform:translateY(-2px)}
.class-card.on{transform:translateY(-2px)}
.class-num{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.class-label{font-size:12px;font-weight:600;margin-bottom:3px}
.class-pression{font-family:'Fira Mono',monospace;font-size:11px;opacity:.7;margin-bottom:6px}
.class-pathos{font-size:11px;line-height:1.5;opacity:.75}

/* ── INDICATIONS ── */
.indication-tag{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:11px;margin:2px;cursor:pointer;
  border:1px solid transparent;transition:all .18s;
  font-family:'Fira Mono',monospace;
}

/* ── BARRE PRESSION ── */
.pression-bar{
  height:24px;border-radius:12px;overflow:hidden;
  background:linear-gradient(90deg,var(--c1) 0%,var(--c2) 33%,var(--c3) 66%,var(--c4) 100%);
  position:relative;margin:8px 0;
}
.pression-cursor{
  position:absolute;top:-3px;bottom:-3px;width:4px;
  border-radius:2px;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.6);
  transition:left .5s cubic-bezier(.34,1.56,.64,1);transform:translateX(-50%);
}
.pression-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);font-family:'Fira Mono',monospace}

/* ── INFO BOXES ── */
.info{border-radius:11px;padding:12px 15px;font-size:13px;line-height:1.7}
.info-em  {background:rgba(184,160,232,.06);border:1px solid rgba(184,160,232,.18);color:var(--em)}
.info-red {background:rgba(224,96,96,.07);  border:1px solid rgba(224,96,96,.2);  color:var(--red)}
.info-teal{background:rgba(94,207,190,.06); border:1px solid rgba(94,207,190,.18);color:var(--teal)}
.info-amb {background:rgba(232,196,106,.06);border:1px solid rgba(232,196,106,.18);color:var(--amber)}
.info-grn {background:rgba(114,201,138,.06);border:1px solid rgba(114,201,138,.18);color:var(--green)}

/* ── MESURES INPUT BOX ── */
.mesure-box{
  background:rgba(0,0,0,.22);border:1px solid rgba(184,160,232,.12);
  border-radius:14px;padding:18px;margin-bottom:12px;
}
.mesure-title{
  font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;
  margin-bottom:14px;color:var(--em);display:flex;align-items:center;gap:8px;
}
.mesure-field{
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
}
.mesure-field label{font-size:13px;color:var(--txt2);min-width:140px}
.mesure-field input{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;color:var(--txt);padding:8px 12px;
  font-size:15px;font-family:'Fira Mono',monospace;outline:none;
  width:80px;text-align:center;transition:border-color .2s;
}
.mesure-field input:focus{border-color:rgba(184,160,232,.4)}
.mesure-field .unit{font-size:12px;color:var(--txt3);font-family:'Fira Mono',monospace}
.mesure-field .taille-ref{font-size:11px;color:var(--em);font-family:'Fira Mono',monospace;margin-left:4px}

/* ── TAILLE RECOMMANDÉE ── */
.taille-badge{
  display:inline-block;padding:4px 12px;border-radius:20px;
  font-family:'Fira Mono',monospace;font-size:12px;font-weight:500;
  background:rgba(184,160,232,.12);border:1px solid rgba(184,160,232,.3);color:var(--em);
}

/* ── RECAP ── */
.recap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.rc{background:rgba(0,0,0,.22);border-radius:10px;padding:10px 13px}
.rc-k{font-size:10px;color:#2d2540;text-transform:uppercase;letter-spacing:1px;font-family:'Fira Mono',monospace}
.rc-v{font-size:13px;color:var(--txt);margin-top:4px;line-height:1.4}

/* ── ANALYSIS ── */
.analysis p{margin-bottom:16px;color:#b0a8c4;font-size:15px;line-height:1.85}
.analysis strong{color:var(--txt);font-size:16px}

/* ── API KEY / PREMIUM ── */
.premium-box{
  background:rgba(0,0,0,.32);border:1.5px solid rgba(184,160,232,.18);
  border-radius:18px;padding:28px;margin-bottom:16px;
}
.apikey-box{
  background:rgba(184,160,232,.04);border:1px solid rgba(184,160,232,.15);
  border-radius:12px;padding:14px 16px;
}
.apikey-box p{font-size:13px;color:var(--txt3);margin-bottom:10px;line-height:1.6}
.apikey-box a{color:var(--em)}
.apikey-row{display:flex;gap:8px}
.apikey-row input{flex:1;padding:9px 12px;font-size:13px}
.apikey-row button{
  padding:9px 16px;border:none;border-radius:9px;
  background:var(--em2);color:#0d0a14;font-weight:700;
  cursor:pointer;font-family:'Epilogue',sans-serif;font-size:13px;
}
.apikey-saved{color:var(--green);font-size:11px;margin-top:6px;font-family:'Fira Mono',monospace}

/* ── WELCOME ── */
.welcome{text-align:center;padding:4px 0 28px}
.welcome-icon{font-size:60px;display:block;margin-bottom:18px}
.welcome p{color:var(--txt2);font-size:15px;line-height:1.8;max-width:480px;margin:0 auto}
.pts{display:flex;flex-direction:column;gap:14px;margin:24px 0;text-align:left}
.pt{display:flex;gap:12px;align-items:flex-start}
.pt-i{font-size:20px;flex-shrink:0;margin-top:2px}
.pt-t{font-size:14px;color:var(--txt2);line-height:1.65}
.pt-t strong{color:var(--txt)}

/* ── LOADING ── */
.dots{text-align:center;padding:28px 0}
.dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--em);margin:0 3px;animation:dotB 1.4s ease-in-out infinite both}
.dots span:nth-child(2){animation-delay:.16s}
.dots span:nth-child(3){animation-delay:.32s}
.dots-msg{color:var(--txt3);font-size:13px;margin-top:10px;font-style:italic}

hr.div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:20px 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotB  {0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes pulse {0%,100%{opacity:.5}50%{opacity:1}}

.fadeup{animation:fadeUp .35s ease forwards}

@media(max-width:480px){
  .grid2,.grid3,.recap{grid-template-columns:1fr}
  .nav-row{flex-direction:column}
  .leg-label,.leg-meas{display:none}
}

    /* ── SLIDERS AMÉLIORÉS ── */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 10px;
      border-radius: 5px;
      background: rgba(255,255,255,.10);
      outline: none; cursor: pointer;
      margin-top: 4px;
      touch-action: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid rgba(255,255,255,.18);
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      transition: transform .15s;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.18); }
    input[type=range]::-webkit-slider-runnable-track {
      height: 10px; border-radius: 5px;
    }

    input[type=range]::-webkit-slider-thumb {
      background: #b8a0e8;
    }

    /* ── STEPPER WRAPPER ── */
    .sl-wrap {
      display: flex; align-items: center; gap: 10px; width: 100%;
    }
    .sl-wrap input[type=range] { flex: 1; }
    .sl-btn {
      flex-shrink: 0;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.55);
      font-size: 20px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, transform .1s;
      user-select: none; -webkit-user-select: none;
    }
    .sl-btn:hover  { background: rgba(255,255,255,.12); color: #fff; }
    .sl-btn:active { transform: scale(.9); }

</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════
const PATHOLOGIES = [
  { id:'varices',    label:'Varices / Insuffisance veineuse chronique', icon:'🩸', short:'IVC',     classe:2 },
  { id:'tved',       label:'Prévention TVP / Embolie pulmonaire',       icon:'⚠️', short:'Prév.TVP', classe:3 },
  { id:'tvp_traitee',label:'TVP ou EP traitée',                         icon:'🩹', short:'TVP traitée',classe:3 },
  { id:'lymphoedeme',label:'Lymphœdème',                                icon:'💧', short:'Lymphœdème',classe:3 },
  { id:'postop',     label:'Post-opératoire / Alitement prolongé',      icon:'🏥', short:'Post-op',  classe:2 },
  { id:'grossesse',  label:'Grossesse / Post-partum',                   icon:'🤰', short:'Grossesse', classe:2 },
  { id:'voyage',     label:'Voyage longue durée / Prévention légère',   icon:'✈️', short:'Voyage',   classe:1 },
  { id:'ulcere',     label:'Ulcère veineux de jambe',                   icon:'🩺', short:'Ulcère',   classe:4 },
];

const CLASSES = [
  { id:1, label:'Légère',     pression:'10–15 mmHg', col:'#72c98a', bg:'rgba(114,201,138,.08)', bdr:'rgba(114,201,138,.3)', pathos:'Jambes lourdes, varices débutantes, prévention voyage', contre:'Aucune spécifique' },
  { id:2, label:'Modérée',    pression:'15–20 mmHg', col:'#5ecfbe', bg:'rgba(94,207,190,.08)',  bdr:'rgba(94,207,190,.3)',  pathos:'Varices symptomatiques, œdème, post-op, grossesse',    contre:'Vérifier IOTD avant' },
  { id:3, label:'Forte',      pression:'20–36 mmHg', col:'#e8c46a', bg:'rgba(232,196,106,.08)', bdr:'rgba(232,196,106,.3)', pathos:'TVP, récidive variqueuse, lymphœdème modéré',           contre:'IOTD, artériopathie' },
  { id:4, label:'Très forte', pression:'> 36 mmHg',  col:'#e06060', bg:'rgba(224,96,96,.08)',   bdr:'rgba(224,96,96,.3)',   pathos:'Ulcère veineux, lymphœdème sévère',                    contre:'Prescription médicale obligatoire' },
];

const DISPOSITIFS = [
  { id:'bas_cuisse',   label:'Bas de contention cuisse', icon:'🦵', mesures:['cheville','mollet','cuisse','hauteur_jambe'] },
  { id:'bas_genou',    label:'Bas de contention genou',  icon:'🦿', mesures:['cheville','mollet','hauteur_mollet'] },
  { id:'collant',      label:'Collant de contention',    icon:'👖', mesures:['cheville','mollet','cuisse','hauteur_jambe','taille_hanches'] },
  { id:'bande',        label:'Bande de contention',      icon:'🩹', mesures:['cheville','mollet'] },
];

// Grilles de tailles (simplifiées, indicatives)
const TAILLE_GRILLES = {
  bas_genou: [
    { taille:'S',  cheville:[17,20], mollet:[27,31] },
    { taille:'M',  cheville:[20,23], mollet:[31,36] },
    { taille:'L',  cheville:[23,26], mollet:[36,42] },
    { taille:'XL', cheville:[26,30], mollet:[42,49] },
  ],
  bas_cuisse: [
    { taille:'S',  cheville:[17,20], mollet:[27,31], cuisse:[40,50] },
    { taille:'M',  cheville:[20,23], mollet:[31,36], cuisse:[50,60] },
    { taille:'L',  cheville:[23,26], mollet:[36,42], cuisse:[60,70] },
    { taille:'XL', cheville:[26,30], mollet:[42,49], cuisse:[70,82] },
  ],
  collant: [
    { taille:'S',  cheville:[17,20], mollet:[27,32] },
    { taille:'M',  cheville:[20,23], mollet:[32,37] },
    { taille:'L',  cheville:[23,26], mollet:[37,43] },
    { taille:'XL', cheville:[26,30], mollet:[43,50] },
  ],
  bande: [
    { taille:'Standard', cheville:[0,50], mollet:[0,50] },
  ],
};

const CONTRE_INDICATIONS = [
  { id:'arterite',  label:'Artériopathie oblitérante (IOTD < 0,6)', icon:'🚫', bloquant:true },
  { id:'dermo',     label:'Dermatose ou plaie infectée cutanée',      icon:'🩹', bloquant:true },
  { id:'phlegmon',  label:'Phlébite septique / phlegmon',             icon:'⚠️', bloquant:true },
  { id:'ic',        label:'Insuffisance cardiaque décompensée',        icon:'❤️', bloquant:false },
  { id:'neuropathie',label:'Neuropathie diabétique sévère',           icon:'🩺', bloquant:false },
];

// ═══════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════
let S = {
  view:'welcome',
  patient:{
    prenom:'Éliane', sexe:'F', age:62, poids:72, taille:164,
    pathologie:'varices', contreIndications:[]
  },
  mesures:{
    cheville:22, mollet:34, cuisse:52, hauteur_jambe:38,
    hauteur_mollet:38, taille_hanches:92
  },
  rx:{ dispositif:'bas_genou', classe:2, cote:'bilateral' },
  analyse:'', loading:false, showKey:false,
  apiKey:localStorage.getItem('simcont_key')||'',
  apiKeySaved:!!localStorage.getItem('simcont_key'),
};

// ═══════════════════════════════════════
//  LOGIQUE
// ═══════════════════════════════════════
function recommandeClasse(){
  const pa = PATHOLOGIES.find(p=>p.id===S.patient.pathologie);
  return pa ? pa.classe : 2;
}

function recommandeTaille(){
  const grille = TAILLE_GRILLES[S.rx.dispositif] || TAILLE_GRILLES.bas_genou;
  const m = S.mesures;
  for(const t of grille){
    const ok_ch = !t.cheville || (m.cheville >= t.cheville[0] && m.cheville <= t.cheville[1]);
    const ok_mo = !t.mollet   || (m.mollet   >= t.mollet[0]   && m.mollet   <= t.mollet[1]);
    const ok_cu = !t.cuisse   || (m.cuisse   >= t.cuisse[0]   && m.cuisse   <= t.cuisse[1]);
    if(ok_ch && ok_mo && ok_cu) return t.taille;
  }
  return 'Mesures hors grille standard';
}

function hasContreIndic(){
  return S.patient.contreIndications.some(id => {
    const ci = CONTRE_INDICATIONS.find(c=>c.id===id);
    return ci && ci.bloquant;
  });
}

function ageLabel(a){
  if(a<18)return 'Adolescent';if(a<65)return 'Adulte';return 'Personne âgée';
}
function dispObj(){ return DISPOSITIFS.find(d=>d.id===S.rx.dispositif)||DISPOSITIFS[0] }
function pathoObj(){ return PATHOLOGIES.find(p=>p.id===S.patient.pathologie)||PATHOLOGIES[0] }
function classeObj(){ return CLASSES.find(c=>c.id===S.rx.classe)||CLASSES[1] }

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function renderMd(text){
  return text.split('\n\n').filter(p=>p.trim()).map(para=>{
    const parts=para.split(/\*\*([^*]+)\*\*/g);
    const inner=parts.map((p,i)=>i%2===1?`<strong>${esc(p)}</strong>`:esc(p)).join('');
    return `<p>${inner}</p>`;
  }).join('');
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function go(v){S.view=v;render(true);}
function up(k,v){S.patient={...S.patient,[k]:v};render()}
function upRx(k,v){S.rx={...S.rx,[k]:v};render()}
function upMes(k,v){S.mesures={...S.mesures,[k]:parseFloat(v)||0};render()}
function goAnalyse(){S.view='step4';S.analyse='';render(true);runAnalyse();}
function saveKey(){localStorage.setItem('simcont_key',S.apiKey);S.apiKeySaved=true;render()}
function toggleCI(id){
  const f=S.patient.contreIndications;
  S.patient.contreIndications=f.includes(id)?f.filter(x=>x!==id):[...f,id];
  render(true);
}
function reset(){
  S={...S,view:'step1',
    patient:{prenom:'',sexe:'F',age:55,poids:68,taille:165,pathologie:'varices',contreIndications:[]},
    mesures:{cheville:22,mollet:34,cuisse:52,hauteur_jambe:38,hauteur_mollet:38,taille_hanches:90},
    rx:{dispositif:'bas_genou',classe:2,cote:'bilateral'},analyse:''};
  render();
}

// ═══════════════════════════════════════
//  API CLAUDE
// ═══════════════════════════════════════
async function runAnalyse(){
  if(hasContreIndic()){S.analyse='**🚫 Analyse bloquée — contre-indication formelle présente.**\n\nAucune contention ne doit être posée pour ce patient sans avis médical explicite.';S.loading=false;render();return}
  const pr   = S.patient.prenom||'le patient';
  const pa   = pathoObj();
  const di   = dispObj();
  const cl   = classeObj();
  const clRec= recommandeClasse();
  const taille=recommandeTaille();
  const ciLabels=S.patient.contreIndications.map(id=>CONTRE_INDICATIONS.find(c=>c.id===id)?.label||id).join(', ')||'aucune';

  S.loading=true;S.analyse='';render();

  const prompt=`Tu es un formateur infirmier expert en phlébologie et contention veineuse. Un étudiant IFSI vient de simuler une prise en charge pour contention veineuse. Aide-le à développer son intuition clinique — pas à mémoriser des tableaux de tailles.

PATIENT : ${pr}, ${S.patient.sexe==='H'?'homme':'femme'} de ${S.patient.age} ans, ${S.patient.poids} kg, ${S.patient.taille} cm.
Pathologie / indication : ${pa.label}.
Contre-indications signalées : ${ciLabels}.

MESURES PRISES :
- Tour de cheville : ${S.mesures.cheville} cm
- Tour de mollet : ${S.mesures.mollet} cm
- Tour de cuisse : ${S.mesures.cuisse} cm

PRESCRIPTION SIMULÉE :
- Dispositif : ${di.label}
- Classe : ${cl.id} (${cl.label} · ${cl.pression})
- Classe recommandée pour cette pathologie : ${clRec}
- Taille calculée : ${taille}
- Côté : ${S.rx.cote}

Réponds avec EXACTEMENT ces 4 blocs (titres en gras obligatoires) :

**🩹 Cohérence de la prescription pour ${pr}**
[2-3 phrases. La classe choisie est-elle adaptée à CETTE pathologie et CE profil ? Lien physiologique direct. Si écart avec la classe recommandée, explique pourquoi c'est problématique ou acceptable.]

**📏 Ce que ces mesures signifient pour CE patient**
[2-3 phrases. Interpréter les mesures dans le contexte du profil — morphologie, pathologie, IMC. La taille ${taille} est-elle cohérente ? Y a-t-il un risque de mesure inadaptée ?]

**⏰ La règle des règles pour CE patient**
[2 phrases. Le moment de pose pour CE dispositif avec CETTE pathologie. Pourquoi c'est particulièrement important pour lui/elle.]

**👁️ 3 signes de surveillance spécifiques**
[3 signes numérotés, chacun expliqué en 1 phrase. Liés à SA pathologie, SA morphologie, SA classe de compression. Par exemple : signes d'ischémie si artériopathie non détectée, compression trop forte, etc.]

Tutoie l'étudiant. Direct, chaleureux, cliniquement précis.`;

  try{
    const headers={'Content-Type':'application/json'};
    if(S.apiKey){headers['x-api-key']=S.apiKey;headers['anthropic-version']='2023-06-01';}
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1100,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    S.analyse=data.content?.find(b=>b.type==='text')?.text||'';
  }catch(e){
    S.analyse=`**⚠️ Erreur**\n\n${e.message||'Vérifiez votre clé API et votre connexion.'}`;
  }
  S.loading=false;render();
}

render();

// ── ENHANCEMENT SLIDERS : boutons −/+ ──────────────────────
function enhanceSliders() {
  document.querySelectorAll('input[type=range]').forEach(input => {
    if (input.closest('.sl-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'sl-wrap';
    input.parentNode.insertBefore(wrap, input);

    const btnM = document.createElement('button');
    btnM.className = 'sl-btn'; btnM.textContent = '−'; btnM.type = 'button';
    btnM.addEventListener('click', e => {
      e.preventDefault();
      const step = parseFloat(input.step) || 1;
      const nv   = Math.max(parseFloat(input.min), parseFloat(input.value) - step);
      input.value = nv;
      input.dispatchEvent(new Event('input', { bubbles:true }));
    });

    const btnP = document.createElement('button');
    btnP.className = 'sl-btn'; btnP.textContent = '+'; btnP.type = 'button';
    btnP.addEventListener('click', e => {
      e.preventDefault();
      const step = parseFloat(input.step) || 1;
      const nv   = Math.min(parseFloat(input.max), parseFloat(input.value) + step);
      input.value = nv;
      input.dispatchEvent(new Event('input', { bubbles:true }));
    });

    wrap.appendChild(btnM);
    wrap.appendChild(input);
    wrap.appendChild(btnP);
  });
}
